name: Build ImmortalWrt

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '输入编译分支 (例如: master, v24.10.5)'
        default: 'v24.10.5'
        required: true
        type: string
      config_file:
        description: '输入配置文件名 (例如: v24.10.5-x86.config)'
        default: 'v24.10.5-x86.config'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-24.04

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout your repository
        uses: actions/checkout@v6
        with:
          path: my-repo

      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v6
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ github.event.inputs.branch }}
          path: immortalwrt

      - name: Extract Release Name
        id: vars
        run: |
          CONFIG_FILE="${{ github.event.inputs.config_file }}"
          RELEASE_NAME="${CONFIG_FILE%.*}"
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Update and install feeds
        working-directory: ./immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        working-directory: ./immortalwrt
        run: |
          cp ../my-repo/${{ github.event.inputs.config_file }} .config
          make defconfig

      - name: Download package
        working-directory: ./immortalwrt
        run: |
          make download -j$(nproc)

      - name: Compile firmware
        working-directory: ./immortalwrt
        run: |
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make V=s -j1

      - name: Package firmware
        working-directory: ./immortalwrt
        run: |
          tar -czvf immortalwrt-firmware.tar.gz -C bin/targets/ .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: '${{ steps.vars.outputs.release_name }}-${{ github.run_id }}'
          name: '${{ steps.vars.outputs.release_name }}'
          files: immortalwrt/immortalwrt-firmware.tar.gz
